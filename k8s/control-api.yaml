apiVersion: apps/v1
kind: Deployment
metadata:
  name: control-api
  namespace: aiops
spec:
  replicas: 1
  selector:
    matchLabels:
      app: control-api
  template:
    metadata:
      labels:
        app: control-api
    spec:
      containers:
        - name: control-api
          image: ghcr.io/feize1995/aiops-control-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 4000
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              valueFrom:
                configMapKeyRef:
                  name: aiops-platform-config
                  key: CONTROL_API_PORT
            - name: CONTROL_API_BASE_URL
              valueFrom:
                configMapKeyRef:
                  name: aiops-platform-config
                  key: CONTROL_API_BASE_URL
            - name: CORS_ORIGINS
              valueFrom:
                configMapKeyRef:
                  name: aiops-platform-config
                  key: CORS_ORIGINS
            - name: AI_MODEL_BASE_URL
              valueFrom:
                configMapKeyRef:
                  name: aiops-platform-config
                  key: AI_MODEL_BASE_URL
            - name: AI_MODEL_NAME
              valueFrom:
                configMapKeyRef:
                  name: aiops-platform-config
                  key: AI_MODEL_NAME
            - name: AI_MODEL_MAX_TOKENS
              valueFrom:
                configMapKeyRef:
                  name: aiops-platform-config
                  key: AI_MODEL_MAX_TOKENS
            - name: AI_MODEL_TIMEOUT_MS
              valueFrom:
                configMapKeyRef:
                  name: aiops-platform-config
                  key: AI_MODEL_TIMEOUT_MS
            - name: SWAGGER_ENABLED
              valueFrom:
                configMapKeyRef:
                  name: aiops-platform-config
                  key: SWAGGER_ENABLED
            - name: RUNTIME_GATEWAY_BASE_URL
              valueFrom:
                configMapKeyRef:
                  name: aiops-platform-config
                  key: RUNTIME_GATEWAY_BASE_URL
            - name: RUNTIME_GATEWAY_PUBLIC_BASE_URL
              valueFrom:
                configMapKeyRef:
                  name: aiops-platform-config
                  key: RUNTIME_GATEWAY_PUBLIC_BASE_URL
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: aiops-platform-secret
                  key: DATABASE_URL
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: aiops-platform-secret
                  key: REDIS_URL
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: aiops-platform-secret
                  key: JWT_SECRET
            - name: JWT_EXPIRES_IN
              valueFrom:
                secretKeyRef:
                  name: aiops-platform-secret
                  key: JWT_EXPIRES_IN
            - name: REFRESH_TOKEN_EXPIRES_IN
              valueFrom:
                secretKeyRef:
                  name: aiops-platform-secret
                  key: REFRESH_TOKEN_EXPIRES_IN
            - name: DEFAULT_ADMIN_EMAIL
              valueFrom:
                secretKeyRef:
                  name: aiops-platform-secret
                  key: DEFAULT_ADMIN_EMAIL
            - name: DEFAULT_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: aiops-platform-secret
                  key: DEFAULT_ADMIN_PASSWORD
            - name: RUNTIME_TOKEN_SECRET
              valueFrom:
                secretKeyRef:
                  name: aiops-platform-secret
                  key: RUNTIME_TOKEN_SECRET
            - name: RUNTIME_GATEWAY_INTERNAL_SECRET
              valueFrom:
                secretKeyRef:
                  name: aiops-platform-secret
                  key: RUNTIME_GATEWAY_INTERNAL_SECRET
            - name: AI_MODEL_API_KEY
              valueFrom:
                secretKeyRef:
                  name: aiops-platform-secret
                  key: AI_MODEL_API_KEY
          readinessProbe:
            httpGet:
              path: /api/capabilities
              port: 4000
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/capabilities
              port: 4000
            initialDelaySeconds: 30
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: control-api
  namespace: aiops
spec:
  selector:
    app: control-api
  ports:
    - port: 4000
      targetPort: 4000
