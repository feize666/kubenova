apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: aiops
  namespace: aiops
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "120"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "120"
spec:
  ingressClassName: nginx
  rules:
    - host: aiops.local
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: control-api
                port:
                  number: 4000
          - path: /ws
            pathType: Prefix
            backend:
              service:
                name: runtime-gateway
                port:
                  number: 4100
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 3000
