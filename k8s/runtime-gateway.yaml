apiVersion: apps/v1
kind: Deployment
metadata:
  name: runtime-gateway
  namespace: aiops
spec:
  replicas: 1
  selector:
    matchLabels:
      app: runtime-gateway
  template:
    metadata:
      labels:
        app: runtime-gateway
    spec:
      containers:
        - name: runtime-gateway
          image: ghcr.io/feize1995/aiops-runtime-gateway:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 4100
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              valueFrom:
                configMapKeyRef:
                  name: aiops-platform-config
                  key: RUNTIME_GATEWAY_PORT
            - name: CONTROL_API_BASE_URL
              valueFrom:
                configMapKeyRef:
                  name: aiops-platform-config
                  key: CONTROL_API_INTERNAL_BASE_URL
            - name: ALLOWED_ORIGINS
              valueFrom:
                configMapKeyRef:
                  name: aiops-platform-config
                  key: CORS_ORIGINS
            - name: RUNTIME_TOKEN_SECRET
              valueFrom:
                secretKeyRef:
                  name: aiops-platform-secret
                  key: RUNTIME_TOKEN_SECRET
            - name: RUNTIME_GATEWAY_INTERNAL_SECRET
              valueFrom:
                secretKeyRef:
                  name: aiops-platform-secret
                  key: RUNTIME_GATEWAY_INTERNAL_SECRET
          readinessProbe:
            httpGet:
              path: /healthz
              port: 4100
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 4100
            initialDelaySeconds: 20
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: runtime-gateway
  namespace: aiops
spec:
  selector:
    app: runtime-gateway
  ports:
    - port: 4100
      targetPort: 4100
