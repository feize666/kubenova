apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: aiops
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: ghcr.io/feize1995/aiops-frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          env:
            - name: NODE_ENV
              value: production
            - name: NEXT_PUBLIC_CONTROL_API_BASE
              valueFrom:
                configMapKeyRef:
                  name: aiops-platform-config
                  key: NEXT_PUBLIC_CONTROL_API_BASE
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 20
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: aiops
spec:
  selector:
    app: frontend
  ports:
    - port: 3000
      targetPort: 3000
