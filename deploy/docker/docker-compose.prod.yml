version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: aiops-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-aiops}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
      POSTGRES_DB: ${POSTGRES_DB:-aiops}
    volumes:
      - aiops_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-aiops} -d ${POSTGRES_DB:-aiops}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: aiops-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - aiops_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  control-api:
    image: ${CONTROL_API_IMAGE:-ghcr.io/feize1995/aiops-control-api:latest}
    container_name: aiops-control-api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: ${CONTROL_API_PORT:-4000}
      CONTROL_API_BASE_URL: ${CONTROL_API_BASE_URL:-http://localhost:4000}
      DATABASE_URL: postgresql://${POSTGRES_USER:-aiops}:${POSTGRES_PASSWORD:-change-me}@postgres:5432/${POSTGRES_DB:-aiops}
      REDIS_URL: redis://redis:6379
      RUNTIME_GATEWAY_BASE_URL: ${RUNTIME_GATEWAY_BASE_URL:-ws://localhost:4100}
      RUNTIME_GATEWAY_PUBLIC_BASE_URL: ${RUNTIME_GATEWAY_PUBLIC_BASE_URL:-}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-15m}
      REFRESH_TOKEN_EXPIRES_IN: ${REFRESH_TOKEN_EXPIRES_IN:-7d}
      RUNTIME_GATEWAY_INTERNAL_SECRET: ${RUNTIME_GATEWAY_INTERNAL_SECRET}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
      SWAGGER_ENABLED: ${SWAGGER_ENABLED:-false}
      DEFAULT_ADMIN_EMAIL: ${DEFAULT_ADMIN_EMAIL:-admin@local.dev}
      DEFAULT_ADMIN_PASSWORD: ${DEFAULT_ADMIN_PASSWORD:-change-me-now}
    ports:
      - "${CONTROL_API_PORT:-4000}:4000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:4000/api/capabilities',r=>process.exit(r.statusCode<500?0:1)).on('error',()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 10

  runtime-gateway:
    image: ${RUNTIME_GATEWAY_IMAGE:-ghcr.io/feize1995/aiops-runtime-gateway:latest}
    container_name: aiops-runtime-gateway
    restart: unless-stopped
    env_file:
      - .env
    environment:
      PORT: ${RUNTIME_GATEWAY_PORT:-4100}
      NODE_ENV: production
      CONTROL_API_BASE_URL: ${CONTROL_API_INTERNAL_BASE_URL:-http://control-api:4000}
      RUNTIME_TOKEN_SECRET: ${RUNTIME_TOKEN_SECRET}
      RUNTIME_GATEWAY_INTERNAL_SECRET: ${RUNTIME_GATEWAY_INTERNAL_SECRET}
      ALLOWED_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
    ports:
      - "${RUNTIME_GATEWAY_PORT:-4100}:4100"
    depends_on:
      control-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:4100/healthz"]
      interval: 15s
      timeout: 5s
      retries: 10

  frontend:
    image: ${FRONTEND_IMAGE:-ghcr.io/feize1995/aiops-frontend:latest}
    container_name: aiops-frontend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_CONTROL_API_BASE: ${NEXT_PUBLIC_CONTROL_API_BASE:-http://control-api:4000}
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      control-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/"]
      interval: 15s
      timeout: 5s
      retries: 10

volumes:
  aiops_postgres_data:
  aiops_redis_data:
