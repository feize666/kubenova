name: kubenova
arch: "{{ .Env.PKG_ARCH }}"
platform: linux
version: "{{ .Env.PKG_VERSION }}"
section: default
priority: optional
maintainer: KubeNova Team <ops@example.com>
description: KubeNova runtime gateway + systemd assets
vendor: KubeNova
homepage: https://github.com/Feize1995/kubenova
license: Proprietary

contents:
  - src: .release/runtime-gateway
    dst: /opt/kubenova/current/runtime-gateway/runtime-gateway
    file_info:
      mode: 0755

  - src: deploy/systemd/kubenova-runtime-gateway.service
    dst: /usr/lib/systemd/system/kubenova-runtime-gateway.service
    file_info:
      mode: 0644

  - src: deploy/systemd/kubenova-control-api.service
    dst: /usr/lib/systemd/system/kubenova-control-api.service
    file_info:
      mode: 0644

  - src: deploy/systemd/kubenova.target
    dst: /usr/lib/systemd/system/kubenova.target
    file_info:
      mode: 0644

  - src: deploy/systemd/env/runtime-gateway.env.example
    dst: /opt/kubenova/current/env/runtime-gateway.env.example
    file_info:
      mode: 0644

  - src: deploy/systemd/env/control-api.env.example
    dst: /opt/kubenova/current/env/control-api.env.example
    file_info:
      mode: 0644

overrides:
  deb:
    scripts:
      postinstall: deploy/packages/scripts/postinstall.sh
      preremove: deploy/packages/scripts/preremove.sh
  rpm:
    scripts:
      postinstall: deploy/packages/scripts/postinstall.sh
      preremove: deploy/packages/scripts/preremove.sh
